<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="cabinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Back Trailer Container -->
    <path d="M20,70 h110 v90 h-110 z" fill="url(#truckGrad)" rx="10" />
    <!-- Container grooved lines -->
    <path d="M40,70 v90 M60,70 v90 M80,70 v90 M100,70 v90 M120,70 v90" stroke="#1e3a8a" stroke-width="3" opacity="0.3" />
    <!-- Sleek Cabin -->
    <path d="M135,90 h45 l20,35 v35 h-65 z" fill="url(#cabinGrad)" rx="8" />
    <!-- Window -->
    <path d="M145,100 h25 l12,20 h-37 z" fill="#0f172a" opacity="0.85" rx="4" />
    <!-- Wheels -->
    <circle cx="50" cy="160" r="18" fill="#1e293b" />
    <circle cx="50" cy="160" r="8" fill="#06b6d4" />
    <circle cx="165" cy="160" r="18" fill="#1e293b" />
    <circle cx="165" cy="160" r="8" fill="#06b6d4" />
    <!-- Accent Motion Lines for Speed effect -->
    <path d="M-10,95 h30" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" opacity="0.6" />
    <path d="M-20,125 h40" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.6" />
    <path d="M-5,155 h25" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" opacity="0.6" />
  </g>
</svg>
